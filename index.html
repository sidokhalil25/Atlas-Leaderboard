<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Atlas Leaderboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#fff;font-family:Inter,system-ui,sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef } = React;

const API_KEY = "$2a$10$WSWUhcWGMW46WYE4ueCIqeAdNqAL4GgT4YzPQ5PmTyT/2nPYA1dqm";
const BIN_ID = "69e68c81aaba8821971d3f11";
const ADMIN_PIN = "13122";
const CATS = [
  {key:"kip",label:"KIP"},{key:"digi",label:"Digi"},
  {key:"net",label:"Net"},{key:"mobile",label:"Mobile"},{key:"upsell",label:"Upsell"}
];

function hashPin(p){let h=0;for(let i=0;i<p.length;i++)h=(Math.imul(31,h)+p.charCodeAt(i))|0;return h.toString();}
function crColor(cr){if(cr>=20)return{bg:"#002a12",fg:"#00A651"};if(cr>=10)return{bg:"#1a1000",fg:"#f5a623"};return{bg:"#1a0000",fg:"#E8002D"};}

async function loadFromCloud(){
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
      headers:{"X-Master-Key":API_KEY}
    });
    const d = await r.json();
    return { members: d.record.members || [] };
  } catch(e){ return { members:[] }; }
}

async function saveToCloud(members){
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
      body:JSON.stringify({members})
    });
  } catch(e){}
}

const S = {
  inp:{background:"#0d0d0d",border:"1px solid #262626",borderRadius:6,padding:"9px 12px",color:"#fff",fontSize:".88rem",width:"100%",fontFamily:"inherit",outline:"none",marginBottom:8,boxSizing:"border-box"},
  lbl:{color:"#555",fontSize:".7rem",letterSpacing:".06em",textTransform:"uppercase",display:"block",marginBottom:3,fontWeight:600},
  red:{background:"#E8002D",border:"none",borderRadius:6,padding:"8px 18px",color:"#fff",fontSize:".82rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"},
  gray:{background:"transparent",border:"1px solid #262626",borderRadius:6,padding:"8px 14px",color:"#555",fontSize:".82rem",cursor:"pointer",fontFamily:"inherit"},
  th:{padding:"9px 10px",textAlign:"center",color:"#444",fontWeight:600,fontSize:".7rem",textTransform:"uppercase",letterSpacing:".05em",whiteSpace:"nowrap",borderBottom:"1px solid #1e1e1e"},
  td:{padding:"10px 10px",textAlign:"center",fontSize:".82rem",borderBottom:"1px solid #161616"},
  card:{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:20,margin:16},
};

function App(){
  const [members,setMembers]=useState([]);
  const [binId,setBinId]=useState(null);
  const [view,setView]=useState("board");
  const [period,setPeriod]=useState("week");
  const [user,setUser]=useState(null);
  const [loginName,setLoginName]=useState("");
  const [loginPin,setLoginPin]=useState("");
  const [loginErr,setLoginErr]=useState("");
  const [entry,setEntry]=useState({kip:"",digi:"",net:"",mobile:"",upsell:"",gespräche:"",kunden:""});
  const [entryMsg,setEntryMsg]=useState("");
  const [adminPin,setAdminPin]=useState("");
  const [adminErr,setAdminErr]=useState("");
  const [adminOk,setAdminOk]=useState(false);
  const [newName,setNewName]=useState("");
  const [newPin,setNewPin]=useState("");
  const [addMsg,setAddMsg]=useState("");
  const [bulkText,setBulkText]=useState("");
  const [bulkPin,setBulkPin]=useState("");
  const [bulkMsg,setBulkMsg]=useState("");
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    loadFromCloud().then(res=>{
      if(res){ setMembers(res.members); }
      setLoading(false);
    });
  },[]);

  async function save(m){
    setMembers([...m]);
    setSaving(true);
    await saveToCloud(m);
    setSaving(false);
  }

  function getStats(member){
    const now=new Date();
    const filtered=(member.entries||[]).filter(e=>{
      const d=new Date(e.date);
      if(period==="week"){const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));mon.setHours(0,0,0,0);return d>=mon;}
      if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
      return true;
    });
    const s={gespräche:0,kunden:0};
    CATS.forEach(c=>s[c.key]=0);
    filtered.forEach(e=>{s.gespräche+=e.gespräche||0;s.kunden+=e.kunden||0;CATS.forEach(c=>s[c.key]+=e[c.key]||0);});
    s.total=CATS.reduce((sum,c)=>sum+s[c.key],0);
    s.cr=s.gespräche>0?(s.kunden/s.gespräche*100):null;
    return s;
  }

  const ranked=[...members].sort((a,b)=>getStats(b).total-getStats(a).total);

  function doLogin(){
    const m=members.find(m=>m.name.toLowerCase()===loginName.trim().toLowerCase());
    if(!m){setLoginErr("Name nicht gefunden.");return;}
    if(m.pinHash!==hashPin(loginPin)){setLoginErr("Falsche PIN.");return;}
    setUser(m.name);setLoginErr("");setLoginPin("");setView("entry");
  }

  async function doEntry(){
    const vals={};CATS.forEach(c=>vals[c.key]=parseInt(entry[c.key])||0);
    vals.gespräche=parseInt(entry.gespräche)||0;vals.kunden=parseInt(entry.kunden)||0;
    const total=CATS.reduce((s,c)=>s+vals[c.key],0);
    if(!total&&!vals.gespräche&&!vals.kunden){setEntryMsg("Mindestens einen Wert.");return;}
    const updated=members.map(m=>m.name!==user?m:{...m,entries:[...(m.entries||[]),{date:new Date().toISOString(),...vals}]});
    await save(updated);
    setEntryMsg(`Eingetragen: ${total} Verträge · ${vals.gespräche} Gespräche · ${vals.kunden} Kunden`);
    setEntry({kip:"",digi:"",net:"",mobile:"",upsell:"",gespräche:"",kunden:""});
    setTimeout(()=>{setEntryMsg("");setView("board");},2000);
  }

  async function doAdd(){
    if(!newName.trim()||newPin.length<4){setAddMsg("Name + mind. 4-stellige PIN.");return;}
    if(members.find(m=>m.name.toLowerCase()===newName.trim().toLowerCase())){setAddMsg("Bereits vorhanden.");return;}
    await save([...members,{name:newName.trim(),pinHash:hashPin(newPin),entries:[]}]);
    setNewName("");setNewPin("");setAddMsg(`${newName.trim()} hinzugefügt!`);
    setTimeout(()=>setAddMsg(""),2000);
  }

  async function doBulk(){
    if(bulkPin.length<4){setBulkMsg("Mind. 4-stellige PIN.");return;}
    const names=bulkText.split("\n").map(n=>n.trim()).filter(n=>n.length>0);
    if(!names.length){setBulkMsg("Keine Namen.");return;}
    const existing=members.map(m=>m.name.toLowerCase());
    const toAdd=names.filter(n=>!existing.includes(n.toLowerCase())).map(n=>({name:n,pinHash:hashPin(bulkPin),entries:[]}));
    if(!toAdd.length){setBulkMsg("Alle bereits vorhanden.");return;}
    await save([...members,...toAdd]);
    setBulkText("");setBulkMsg(`${toAdd.length} Mitglieder hinzugefügt!`);
    setTimeout(()=>setBulkMsg(""),3000);
  }

  async function doDelete(name){await save(members.filter(m=>m.name!==name));}

  if(loading)return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:"1rem"}},"Laden…");

  return React.createElement("div",{style:{minHeight:"100vh",paddingBottom:40}},

    // NAV
    React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderBottom:"1px solid #1a1a1a",flexWrap:"wrap",gap:8}},
      React.createElement("div",{style:{fontWeight:800,fontSize:"1rem",display:"flex",alignItems:"center",gap:8}},
        React.createElement("span",{style:{background:"#E8002D",color:"#fff",fontSize:".65rem",fontWeight:800,padding:"2px 8px",borderRadius:3,letterSpacing:".06em"}},"ATLAS"),
        "Leaderboard",
        saving&&React.createElement("span",{style:{fontSize:".65rem",color:"#555",marginLeft:8}},"speichert…")
      ),
      React.createElement("div",{style:{display:"flex",gap:8}},
        user?React.createElement("button",{style:S.gray,onClick:()=>{setUser(null);setView("board");}},"Abmelden")
           :React.createElement("button",{style:S.red,onClick:()=>setView("login")},"+Eintragen"),
        React.createElement("button",{style:S.gray,onClick:()=>setView("admin")},"Admin")
      )
    ),

    // BOARD
    view==="board"&&React.createElement("div",null,
      React.createElement("div",{style:{display:"flex",gap:8,padding:"14px 16px 0"}},
        [["week","Woche"],["month","Monat"],["alltime","Gesamt"]].map(([k,l])=>
          React.createElement("button",{key:k,onClick:()=>setPeriod(k),style:{background:period===k?"#E8002D":"transparent",border:period===k?"none":"1px solid #262626",borderRadius:5,padding:"5px 13px",color:period===k?"#fff":"#555",fontSize:".75rem",cursor:"pointer",fontFamily:"inherit",fontWeight:period===k?700:400}},l)
        )
      ),
      React.createElement("div",{style:{margin:"12px 16px 0",overflowX:"auto",borderRadius:10,border:"1px solid #1e1e1e"}},
        React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",background:"#111",minWidth:560}},
          React.createElement("thead",null,
            React.createElement("tr",null,
              React.createElement("th",{style:{...S.th,textAlign:"left",paddingLeft:14}},"#"),
              React.createElement("th",{style:{...S.th,textAlign:"left"}},"Name"),
              ...CATS.map(c=>React.createElement("th",{key:c.key,style:S.th},c.label)),
              React.createElement("th",{style:S.th},"Gespräche"),
              React.createElement("th",{style:S.th},"Kunden"),
              React.createElement("th",{style:{...S.th,color:"#888"}},"CR %")
            )
          ),
          React.createElement("tbody",null,
            members.length===0&&React.createElement("tr",null,React.createElement("td",{colSpan:9,style:{...S.td,color:"#333",padding:24,textAlign:"center"}},"Noch keine Mitglieder — Admin → Mitglieder hinzufügen")),
            ranked.map((m,i)=>{
              const s=getStats(m);const cc=s.cr!==null?crColor(s.cr):null;
              return React.createElement("tr",{key:m.name,style:{background:i===0&&s.total>0?"#150505":"transparent"}},
                React.createElement("td",{style:{...S.td,textAlign:"left",paddingLeft:14,color:"#444",fontWeight:700,fontSize:".75rem"}},i+1),
                React.createElement("td",{style:{...S.td,textAlign:"left",fontWeight:700,color:"#ddd",whiteSpace:"nowrap"}},m.name),
                ...CATS.map(c=>React.createElement("td",{key:c.key,style:{...S.td,color:s[c.key]>0?"#fff":"#2a2a2a",fontWeight:s[c.key]>0?600:400}},s[c.key]>0?s[c.key]:"–")),
                React.createElement("td",{style:{...S.td,color:"#555"}},s.gespräche>0?s.gespräche:"–"),
                React.createElement("td",{style:{...S.td,color:"#555"}},s.kunden>0?s.kunden:"–"),
                React.createElement("td",{style:S.td},cc?React.createElement("span",{style:{background:cc.bg,color:cc.fg,borderRadius:4,padding:"2px 7px",fontSize:".73rem",fontWeight:700}},s.cr.toFixed(1)+"%"):React.createElement("span",{style:{color:"#2a2a2a"}},"–"))
              );
            })
          )
        )
      ),
      React.createElement("div",{style:{textAlign:"center",color:"#252525",fontSize:".68rem",padding:"12px 0"}},
        `${period==="week"?"Diese Woche":period==="month"?"Dieser Monat":"Gesamt"} · ${new Date().toLocaleDateString("de-DE")} · ${members.length} Mitglieder`
      )
    ),

    // LOGIN
    view==="login"&&React.createElement("div",{style:S.card},
      React.createElement("div",{style:{fontWeight:800,fontSize:"1rem",marginBottom:14}},"Einloggen"),
      React.createElement("label",{style:S.lbl},"Name"),
      React.createElement("input",{style:S.inp,placeholder:"Dein Name",value:loginName,onChange:e=>setLoginName(e.target.value)}),
      React.createElement("label",{style:S.lbl},"PIN"),
      React.createElement("input",{style:S.inp,type:"password",placeholder:"••••",value:loginPin,onChange:e=>setLoginPin(e.target.value),onKeyDown:e=>e.key==="Enter"&&doLogin()}),
      loginErr&&React.createElement("div",{style:{color:"#E8002D",fontSize:".8rem",marginBottom:8}},loginErr),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement("button",{style:S.red,onClick:doLogin},"Weiter"),
        React.createElement("button",{style:S.gray,onClick:()=>{setView("board");setLoginErr("");}},"Zurück")
      )
    ),

    // ENTRY
    view==="entry"&&React.createElement("div",{style:S.card},
      React.createElement("div",{style:{fontWeight:800,fontSize:"1rem",marginBottom:4}},`Hey ${user}`),
      React.createElement("div",{style:{color:"#444",fontSize:".82rem",marginBottom:14}},"Heute eintragen:"),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}},
        ...CATS.map(c=>React.createElement("div",{key:c.key},
          React.createElement("label",{style:S.lbl},c.label),
          React.createElement("input",{style:S.inp,type:"number",min:"0",placeholder:"0",value:entry[c.key],onChange:e=>setEntry({...entry,[c.key]:e.target.value})})
        ))
      ),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}},
        React.createElement("div",null,React.createElement("label",{style:S.lbl},"Gespräche"),React.createElement("input",{style:S.inp,type:"number",min:"0",placeholder:"0",value:entry.gespräche,onChange:e=>setEntry({...entry,gespräche:e.target.value})})),
        React.createElement("div",null,React.createElement("label",{style:S.lbl},"Geschr. Kunden"),React.createElement("input",{style:S.inp,type:"number",min:"0",placeholder:"0",value:entry.kunden,onChange:e=>setEntry({...entry,kunden:e.target.value})}))
      ),
      entryMsg&&React.createElement("div",{style:{color:"#00A651",fontSize:".8rem",marginBottom:8}},entryMsg),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement("button",{style:S.red,onClick:doEntry},"Eintragen"),
        React.createElement("button",{style:S.gray,onClick:()=>setView("board")},"Abbrechen")
      )
    ),

    // ADMIN
    view==="admin"&&React.createElement("div",{style:S.card},
      React.createElement("div",{style:{fontWeight:800,fontSize:"1rem",marginBottom:14}},"Admin"),
      !adminOk
        ?React.createElement("div",null,
            React.createElement("label",{style:S.lbl},"Admin-PIN"),
            React.createElement("input",{style:S.inp,type:"password",placeholder:"••••",value:adminPin,onChange:e=>setAdminPin(e.target.value),onKeyDown:e=>{if(e.key==="Enter")adminPin===ADMIN_PIN?(setAdminOk(true),setAdminErr("")):(setAdminErr("Falsche PIN."));}}),
            adminErr&&React.createElement("div",{style:{color:"#E8002D",fontSize:".8rem",marginBottom:8}},adminErr),
            React.createElement("div",{style:{display:"flex",gap:8}},
              React.createElement("button",{style:S.red,onClick:()=>adminPin===ADMIN_PIN?(setAdminOk(true),setAdminErr("")):(setAdminErr("Falsche PIN."))},"Entsperren"),
              React.createElement("button",{style:S.gray,onClick:()=>{setView("board");setAdminPin("");setAdminErr("");}},"Zurück")
            )
          )
        :React.createElement("div",null,
            React.createElement("div",{style:{background:"#0d0d0d",border:"1px solid #262626",borderRadius:8,padding:14,marginBottom:20}},
              React.createElement("div",{style:{fontWeight:700,fontSize:".88rem",marginBottom:2,color:"#ccc"}},"Alle Namen importieren"),
              React.createElement("div",{style:{color:"#444",fontSize:".75rem",marginBottom:10}},"Ein Name pro Zeile"),
              React.createElement("textarea",{style:{...S.inp,height:120,resize:"vertical",marginBottom:8,fontFamily:"inherit"},placeholder:"Adam Magomedov\nAhmet Kökösari\n...",value:bulkText,onChange:e=>setBulkText(e.target.value)}),
              React.createElement("label",{style:S.lbl},"Standard-PIN für alle"),
              React.createElement("input",{style:S.inp,type:"password",placeholder:"••••",value:bulkPin,onChange:e=>setBulkPin(e.target.value)}),
              bulkMsg&&React.createElement("div",{style:{color:bulkMsg.includes("!")?"#00A651":"#E8002D",fontSize:".8rem",marginBottom:8}},bulkMsg),
              React.createElement("button",{style:S.red,onClick:doBulk},"Alle importieren")
            ),
            React.createElement("div",{style:{fontWeight:700,fontSize:".88rem",marginBottom:8,color:"#666"}},"Einzeln hinzufügen"),
            React.createElement("label",{style:S.lbl},"Name"),
            React.createElement("input",{style:S.inp,placeholder:"Name",value:newName,onChange:e=>setNewName(e.target.value)}),
            React.createElement("label",{style:S.lbl},"PIN (mind. 4 Stellen)"),
            React.createElement("input",{style:S.inp,type:"password",placeholder:"••••",value:newPin,onChange:e=>setNewPin(e.target.value)}),
            addMsg&&React.createElement("div",{style:{color:"#00A651",fontSize:".8rem",marginBottom:8}},addMsg),
            React.createElement("button",{style:{...S.red,marginBottom:20},onClick:doAdd},"Hinzufügen"),
            members.length>0&&React.createElement("div",null,
              React.createElement("div",{style:{fontWeight:700,fontSize:".88rem",marginBottom:8,color:"#666"}},`Mitglieder (${members.length})`),
              React.createElement("div",{style:{maxHeight:260,overflowY:"auto"}},
                members.map(m=>React.createElement("div",{key:m.name,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1a1a1a"}},
                  React.createElement("span",{style:{fontSize:".88rem",color:"#ccc"}},m.name),
                  React.createElement("button",{onClick:()=>doDelete(m.name),style:{background:"transparent",border:"1px solid #2a0000",borderRadius:4,color:"#E8002D",fontSize:".72rem",padding:"3px 10px",cursor:"pointer"}},"Entfernen")
                ))
              )
            ),
            React.createElement("button",{style:{...S.gray,marginTop:16},onClick:()=>{setView("board");setAdminOk(false);setAdminPin("");}},"Schließen")
          )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
